<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
  <!-- Background -->
  <rect width="800" height="400" fill="#06080f"/>
  
  <!-- Grid overlay -->
  <defs>
    <pattern id="faceGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#a855f7" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <rect width="800" height="400" fill="url(#faceGrid)"/>
  
  <!-- Face Mesh outline - simplified -->
  <g opacity="0.8">
    <!-- Head outline -->
    <ellipse cx="200" cy="150" rx="90" ry="110" fill="none" stroke="#7986a8" stroke-width="2" opacity="0.5"/>
    
    <!-- Grid points for face mesh -->
    <circle cx="160" cy="120" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="200" cy="100" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="240" cy="120" r="3" fill="#3b82f6" opacity="0.8"/>
    
    <circle cx="145" cy="150" r="3" fill="#3b82f6" opacity="0.6"/>
    <circle cx="200" cy="150" r="3" fill="#06f" opacity="0.9"/>
    <circle cx="255" cy="150" r="3" fill="#3b82f6" opacity="0.6"/>
    
    <circle cx="160" cy="180" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="200" cy="190" r="3" fill="#10b981" opacity="0.8"/>
    <circle cx="240" cy="180" r="3" fill="#10b981" opacity="0.7"/>
    
    <!-- Connecting lines -->
    <line x1="160" y1="120" x2="200" y2="100" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="100" x2="240" y2="120" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="160" y1="120" x2="145" y2="150" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="240" y1="120" x2="255" y2="150" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="145" y1="150" x2="255" y2="150" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
    <line x1="160" y1="180" x2="200" y2="190" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="190" x2="240" y2="180" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- ROI Signal maps on right -->
  <g transform="translate(380, 60)">
    <!-- Title -->
    <text x="0" y="0" fill="#e91e8c" font-size="14" font-weight="bold">rPPG Signal Maps</text>
    
    <!-- Heatmap visualization -->
    <rect x="0" y="20" width="60" height="80" fill="#0d3b66" opacity="0.7"/>
    <rect x="70" y="20" width="60" height="80" fill="#d62828" opacity="0.7"/>
    <rect x="140" y="20" width="60" height="80" fill="#22c55e" opacity="0.7"/>
    
    <!-- Labels -->
    <text x="30" y="125" text-anchor="middle" fill="#7986a8" font-size="11">LOW</text>
    <text x="100" y="125" text-anchor="middle" fill="#7986a8" font-size="11">MID</text>
    <text x="170" y="125" text-anchor="middle" fill="#7986a8" font-size="11">HIGH</text>
    
    <!-- Signal waves -->
    <path d="M 0 180 Q 30 160 60 180 T 120 180 T 180 180" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.7"/>
    <text x="0" y="210" fill="#a855f7" font-size="12" font-weight="bold">PPG Signal</text>
    <text x="0" y="230" fill="#7986a8" font-size="11">Physiological Detection</text>
    
    <!-- Detection accuracy -->
    <rect x="0" y="250" width="200" height="20" fill="#0d1117" stroke="#e91e8c" stroke-width="1" opacity="0.5"/>
    <rect x="0" y="250" width="130" height="20" fill="#e91e8c" opacity="0.4"/>
    <text x="100" y="265" text-anchor="middle" fill="#e91e8c" font-size="11" font-weight="bold">65% Accuracy</text>
  </g>
</svg>
