<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
  <!-- Background -->
  <rect width="800" height="400" fill="#06080f"/>
  
  <!-- Grid background -->
  <defs>
    <pattern id="threatGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#e91e8c" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <radialGradient id="threatGlow" cx="50%" cy="50%">
      <stop offset="0%" style={{stopColor: '#e91e8c', stopOpacity: 0.3}} />
      <stop offset="100%" style={{stopColor: '#06080f', stopOpacity: 0}} />
    </radialGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#threatGrid)"/>
  
  <!-- Network nodes and connections -->
  <g opacity="0.85">
    <!-- Central threat node -->
    <circle cx="400" cy="200" r="40" fill="url(#threatGlow)"/>
    <circle cx="400" cy="200" r="35" fill="none" stroke="#e91e8c" stroke-width="2" opacity="0.8"/>
    <circle cx="400" cy="200" r="30" fill="none" stroke="#e91e8c" stroke-width="1" opacity="0.4"/>
    <text x="400" y="210" text-anchor="middle" fill="#e91e8c" font-size="14" font-weight="bold">THREAT</text>
    
    <!-- Satellite threat nodes -->
    <!-- Top node -->
    <circle cx="400" cy="80" r="20" fill="#d62828" opacity="0.6"/>
    <circle cx="400" cy="80" r="18" fill="none" stroke="#d62828" stroke-width="1.5" opacity="0.8"/>
    <line x1="400" y1="120" x2="400" y2="200" stroke="#e91e8c" stroke-width="2" opacity="0.5" stroke-dasharray="5,3"/>
    
    <!-- Left node -->
    <circle cx="200" cy="200" r="20" fill="#f59e0b" opacity="0.6"/>
    <circle cx="200" cy="200" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <line x1="220" y1="200" x2="365" y2="200" stroke="#a855f7" stroke-width="2" opacity="0.4" stroke-dasharray="5,3"/>
    
    <!-- Right node -->
    <circle cx="600" cy="200" r="20" fill="#10b981" opacity="0.6"/>
    <circle cx="600" cy="200" r="18" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
    <line x1="580" y1="200" x2="435" y2="200" stroke="#e91e8c" stroke-width="2" opacity="0.4" stroke-dasharray="5,3"/>
    
    <!-- Bottom left node -->
    <circle cx="250" cy="320" r="20" fill="#ef4444" opacity="0.5"/>
    <circle cx="250" cy="320" r="18" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <line x1="280" y1="310" x2="370" y2="230" stroke="#a855f7" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,2"/>
    
    <!-- Bottom right node -->
    <circle cx="550" cy="320" r="20" fill="#22c55e" opacity="0.5"/>
    <circle cx="550" cy="320" r="18" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <line x1="520" y1="310" x2="430" y2="230" stroke="#e91e8c" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Risk indicators on right -->
  <g transform="translate(60, 60)">
    <!-- Title -->
    <text x="0" y="0" fill="#e91e8c" font-size="14" font-weight="bold">Risk Scores</text>
    
    <!-- Risk bars -->
    <g transform="translate(0, 20)">
      <text x="0" y="12" fill="#7986a8" font-size="11">Critical</text>
      <rect x="0" y="20" width="200" height="8" fill="#0d1117" opacity="0.6" stroke="#e91e8c" stroke-width="1"/>
      <rect x="0" y="20" width="180" height="8" fill="#e91e8c" opacity="0.7"/>
      <text x="210" y="26" fill="#e91e8c" font-size="11" font-weight="bold">94%</text>
    </g>
    
    <g transform="translate(0, 50)">
      <text x="0" y="12" fill="#7986a8" font-size="11">High</text>
      <rect x="0" y="20" width="200" height="8" fill="#0d1117" opacity="0.6" stroke="#f59e0b" stroke-width="1"/>
      <rect x="0" y="20" width="140" height="8" fill="#f59e0b" opacity="0.7"/>
      <text x="210" y="26" fill="#f59e0b" font-size="11" font-weight="bold">71%</text>
    </g>
    
    <g transform="translate(0, 80)">
      <text x="0" y="12" fill="#7986a8" font-size="11">Medium</text>
      <rect x="0" y="20" width="200" height="8" fill="#0d1117" opacity="0.6" stroke="#a855f7" stroke-width="1"/>
      <rect x="0" y="20" width="100" height="8" fill="#a855f7" opacity="0.7"/>
      <text x="210" y="26" fill="#a855f7" font-size="11" font-weight="bold">48%</text>
    </g>
  </g>
</svg>
