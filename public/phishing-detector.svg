<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
  <!-- Background -->
  <rect width="800" height="400" fill="#06080f"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="nlpGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a855f7" stroke-width="0.4" opacity="0.1"/>
    </pattern>
  </defs>
  
  <rect width="800" height="400" fill="url(#nlpGrid)"/>
  
  <!-- Email envelope -->
  <g transform="translate(100, 80)">
    <!-- Envelope -->
    <rect x="0" y="0" width="300" height="180" fill="none" stroke="#7986a8" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="150" y2="90" stroke="#7986a8" stroke-width="1.5" opacity="0.4"/>
    <line x1="300" y1="0" x2="150" y2="90" stroke="#7986a8" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Email content -->
    <text x="20" y="30" fill="#7986a8" font-size="11">To: recipient@bank.com</text>
    <text x="20" y="50" fill="#e91e8c" font-size="12" font-weight="bold">Subject: Urgent Action Required!</text>
    
    <!-- Highlighted toxic keywords -->
    <rect x="20" y="65" width="100" height="20" fill="#e91e8c" opacity="0.2" stroke="#e91e8c" stroke-width="1"/>
    <text x="25" y="80" fill="#e91e8c" font-size="10" font-weight="bold">VERIFY ACCOUNT</text>
    
    <rect x="130" y="65" width="80" height="20" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
    <text x="135" y="80" fill="#f59e0b" font-size="10" font-weight="bold">CONFIRM NOW</text>
    
    <rect x="20" y="95" width="70" height="20" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
    <text x="25" y="110" fill="#ef4444" font-size="10" font-weight="bold">CLICK LINK</text>
    
    <rect x="100" y="95" width="110" height="20" fill="#e91e8c" opacity="0.2" stroke="#e91e8c" stroke-width="1"/>
    <text x="105" y="110" fill="#e91e8c" font-size="10" font-weight="bold">LIMITED TIME OFFER</text>
    
    <!-- Probability bars -->
    <g transform="translate(20, 125)">
      <text fill="#7986a8" font-size="10">Phishing Score:</text>
      <rect x="0" y="15" width="150" height="12" fill="#0d1117" stroke="#7986a8" stroke-width="1" opacity="0.5"/>
      <rect x="0" y="15" width="135" height="12" fill="#e91e8c" opacity="0.8"/>
      <text x="160" y="24" fill="#e91e8c" font-size="11" font-weight="bold">90%</text>
    </g>
  </g>
  
  <!-- Classification result -->
  <g transform="translate(420, 120)">
    <!-- Classification label -->
    <rect x="0" y="0" width="280" height="100" fill="#e91e8c" opacity="0.15" stroke="#e91e8c" stroke-width="2" rx="8"/>
    
    <text x="140" y="30" text-anchor="middle" fill="#e91e8c" font-size="16" font-weight="bold">PHISHING</text>
    <text x="140" y="55" text-anchor="middle" fill="#e91e8c" font-size="28" font-weight="bold">DETECTED</text>
    
    <text x="140" y="85" text-anchor="middle" fill="#7986a8" font-size="11">Confidence: 90.2%</text>
  </g>
  
  <!-- NLP Analysis on right -->
  <g transform="translate(420, 240)">
    <text fill="#a855f7" font-size="12" font-weight="bold">NLP Analysis</text>
    
    <g transform="translate(0, 25)">
      <circle cx="10" cy="0" r="4" fill="#e91e8c" opacity="0.7"/>
      <text x="20" y="5" fill="#7986a8" font-size="10">Urgency Tokens: 5</text>
    </g>
    
    <g transform="translate(0, 50)">
      <circle cx="10" cy="0" r="4" fill="#f59e0b" opacity="0.7"/>
      <text x="20" y="5" fill="#7986a8" font-size="10">Authority Spoofing: 4</text>
    </g>
    
    <g transform="translate(0, 75)">
      <circle cx="10" cy="0" r="4" fill="#22c55e" opacity="0.7"/>
      <text x="20" y="5" fill="#7986a8" font-size="10">Legitimate Markers: 1</text>
    </g>
  </g>
</svg>
